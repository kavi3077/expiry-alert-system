<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
body{font-family:Arial;background:#020617;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1e293b;padding:30px;border-radius:12px;width:300px}
input,button{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px}
button{background:#22c55e;color:black;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h2>Signup</h2>
<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Create Account</button>
</form>
</div>
</body>
</html>
