<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
body{font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1e293b;padding:30px;border-radius:12px;width:300px}
input,button{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px}
button{background:#38bdf8;color:black;font-weight:bold}
a{color:#38bdf8}
</style>
</head>
<body>
<div class="card">
<h2>Login</h2>
<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p>No account? <a href="/signup">Signup</a></p>
</div>
</body>
</html>
